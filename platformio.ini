; Open CYD Player — ESP32-2432S028R (2.8" resistive "Cheap Yellow Display")
; MJPEG video + MP3 audio player, MIT licensed.

[env:cyd]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600
board_build.partitions = huge_app.csv

lib_deps =
    bodmer/TFT_eSPI@^2.5.43
    bitbank2/JPEGDEC@^1.6.2
    esphome/ESP32-audioI2S@^2.1.0
    paulstoffregen/XPT2046_Touchscreen@^1.4

build_flags =
    -O2
    -DCORE_DEBUG_LEVEL=1
    ; ---------- TFT_eSPI config for CYD 2.8R (ILI9341) ----------
    -DUSER_SETUP_LOADED=1
    -DILI9341_2_DRIVER=1
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=320
    -DTFT_MISO=12
    -DTFT_MOSI=13
    -DTFT_SCLK=14
    -DTFT_CS=15
    -DTFT_DC=2
    -DTFT_RST=-1
    -DTFT_BL=21
    -DTFT_BACKLIGHT_ON=HIGH
    -DSPI_FREQUENCY=55000000
    -DSPI_READ_FREQUENCY=20000000
    -DLOAD_GLCD=1
    -DLOAD_FONT2=1
    -DLOAD_FONT4=1
    -DLOAD_GFXFF=1
    -DSMOOTH_FONT=1
